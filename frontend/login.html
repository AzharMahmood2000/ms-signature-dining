<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ms Signature Dining</title>
    <link rel="stylesheet" href="Styles/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="login-page">
        <!-- Left Section: Form -->
        <div class="form-container">
            <div class="logo-area">
                <img src="images/logo.png" alt="Logo">
            </div>

            <div class="form-header">
                <h2>WELCOME BACK</h2>
                <p>Sign in with your email address and password</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <a href="#" class="forgot-pw">forgot password?</a>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="separator">or</div>

            <div class="social-login">
                <button class="social-btn"><i class="fa-brands fa-google"></i> Continue with Google</button>
                <button class="social-btn"><i class="fa-brands fa-apple"></i> Continue with Apple</button>
            </div>

            <p class="signup-link">Don't Have an Account? <a href="signup.html">Signup</a></p>
        </div>

        <!-- Right Section: Image -->
        <div class="image-container">
            <img src="images/login img.jpg" alt="right-section">
        </div>
    </div>

    <script src="script/login.js"></script>
</body>

</html>
