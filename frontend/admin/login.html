<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Ms Signature Dining</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c9a84c;
            --dark: #0d0d0d;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        /* Abstract Background */
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.1) 0%, transparent 70%);
            top: -200px; right: -200px; z-index: -1;
        }
        .bg-glow-2 {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.05) 0%, transparent 70%);
            bottom: -150px; left: -150px; z-index: -1;
        }

        .login-card {
            background: #151515;
            border: 1px solid var(--border);
            padding: 50px 40px;
            border-radius: 30px;
            width: 420px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { margin-bottom: 30px; }
        .logo img { width: 70px; margin-bottom: 15px; border-radius: 50%; border: 2px solid var(--primary); padding: 5px; }
        .logo h1 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--primary); letter-spacing: 1px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 14px 18px; background: #1a1a1a;
            border: 1px solid var(--border); border-radius: 12px; color: #fff;
            font-size: 15px; outline: none; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary); background: #222; }

        .login-btn {
            width: 100%; padding: 16px; background: var(--primary); color: #000;
            border: none; border-radius: 12px; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .login-btn:hover { background: #dcb95c; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(201, 168, 76, 0.2); }

        .footer-links { margin-top: 30px; font-size: 14px; color: #666; }
        .footer-links a { color: #888; text-decoration: none; transition: 0.3s; }
        .footer-links a:hover { color: var(--primary); }

        #errorMsg { color: #ff5e5e; font-size: 14px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="login-card">
        <div class="logo">
            <img src="../images/logo.png" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=MS&background=c9a84c&color=fff'">
            <h1>Admin Panel</h1>
        </div>

        <div id="errorMsg">Invalid credentials. Please try again.</div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@mssignature.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Secure Login</button>
        </form>

        <div class="footer-links">
            <a href="../Home.html">← Back to Website</a>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: email, password: password })
                });

                const data = await response.json();

                if (response.ok && data.user.role === 'admin') {
                    // Success! Store token/user and redirect
                    localStorage.setItem('adminToken', 'true');
                    localStorage.setItem('adminUser', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = data.user && data.user.role !== 'admin' 
                        ? 'Access Denied: Not an admin account.' 
                        : 'Invalid email or password.';
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Connection error. Is the server running?';
            }
        });
    </script>
</body>
</html>
