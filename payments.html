<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Details</title>
    <link rel="stylesheet" href="Styles/payments.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="payment-wrapper">
        <!-- Top Navigation -->
        <header class="payment-header">
            <div class="back-button">
                <a href="#">
                    <img src="images/back arrow.png" alt="Back">
                </a>
            </div>
            <nav class="tabs">
                <span class="tab-item">Information</span>
                <span class="tab-item active">Payments</span>
            </nav>
        </header>

        <!-- Main Payment Card -->
        <div class="payment-card">
            <!-- Page Title -->
            <h1 class="page-title">Payment Details</h1>

            <!-- Form Section -->
            <form class="payment-form">
                <div class="form-group">
                    <label for="card-number">Add Card</label>
                    <input type="text" id="card-number" class="full-width">
                </div>

                <div class="form-group">
                    <label for="card-name">Name on Card</label>
                    <input type="text" id="card-name" class="full-width">
                </div>

                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" class="short-width">
                </div>

                <div class="form-group">
                    <label for="expiry">Expiry Date</label>
                    <input type="text" id="expiry" class="short-width">
                </div>

                <!-- Action Button -->
                <div class="button-container">
                    <button type="submit" class="btn-proceed">Proceed To Pay</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script/payments.js"></script>
</body>

</html>
